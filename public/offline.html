<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline — Karsa</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #fdfbf7;
        color: #1a1a1a;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 360px; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff3e0;
        color: #b45309;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 6px 12px;
        border-radius: 999px;
        margin-bottom: 20px;
      }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 800; }
      p { font-size: 14px; color: #555; line-height: 1.55; margin: 0 0 24px; }
      ul {
        text-align: left;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 16px;
        padding: 16px 16px 16px 32px;
        font-size: 13px;
        color: #333;
        margin: 0 0 20px;
      }
      ul li { margin: 6px 0; }
      button {
        background: #e85d33;
        color: #fff;
        border: 0;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">● Offline</span>
      <h1>Tidak ada koneksi</h1>
      <p>Tenang, Ibu/Bapak Guru. Materi yang sudah dibuat tetap bisa diakses tanpa internet.</p>
      <ul>
        <li>Buka <strong>Materi Saya</strong> di AI Copilot</li>
        <li>Catat jurnal kelas — auto kirim saat sinyal kembali</li>
        <li>Generator AI butuh sinyal untuk membuat materi baru</li>
      </ul>
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </body>
</html>
